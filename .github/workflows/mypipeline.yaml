name: mypipeline
 
on:
  push:
    branches: ["main"]

jobs:
    compile:
        runs-on: self-hosted
        steps:
          - name: checkout the code from git
            uses: actions/checkout@v6
          - name: set up jdk 17
            uses: actions/setup-java@v5
            with:
              distribution: 'temurin'
              java-version: '17'
              cache: 'maven' 
          - name: build with maven
            run: mvn compile
            
                 

